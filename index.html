<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frigorífico 2 de Abril | Catálogo Online</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/85vfpN2Z/IMG-20260406-WA0004.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #00AEEF; 
            --primary-dark: #003366; 
            --primary-glow: rgba(0, 174, 239, 0.3);
            --dark: #0a0a0a; 
            --white: #ffffff;
            --slate-100: #f1f5f9;
            --border: #e2e8f0;
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--white); color: var(--dark); line-height: 1.6; overflow-x: hidden; width: 100%; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary-dark);
            padding: 0.7rem 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-img { height: 55px; width: 55px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        .hero-banner {
            margin: 15px 0 30px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #001a33 100%);
            border-radius: var(--radius-lg);
            height: 250px;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid var(--primary);
        }
        .hero-logo { height: 120px; filter: drop-shadow(0 0 15px var(--primary-glow)); }

        .search-container { margin-bottom: 20px; position: relative; }
        .search-input { 
            width: 100%; padding: 18px 20px 18px 55px; border-radius: 99px; 
            border: 1px solid var(--border); background: var(--slate-100);
            font-size: 16px; outline: none; transition: var(--transition);
        }
        .search-input:focus { background: var(--white); border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
        .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--primary-dark); font-size: 1.2rem; }

        .category-nav { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .cat-btn {
            padding: 12px 25px; border-radius: 99px; border: 1px solid var(--border);
            background: var(--white); cursor: pointer; font-weight: 700; white-space: nowrap;
            transition: var(--transition); color: var(--dark); font-size: 0.85rem;
        }
        .cat-btn.active { background: var(--primary-dark); color: var(--white); border-color: var(--primary-dark); }

        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .product-card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 20px; transition: var(--transition); display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-color: var(--primary); }
        
        .badge-offer { position: absolute; top: 20px; left: 20px; background: #ff4757; color: white; padding: 5px 15px; border-radius: 99px; font-size: 0.75rem; font-weight: 800; z-index: 5; }

        .product-image-container { width: 100%; height: 200px; background: #f8fafc; border-radius: var(--radius-md); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #f1f5f9; }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .current-price { font-size: 1.8rem; font-weight: 800; color: var(--primary-dark); letter-spacing: -0.02em; }
        .unit-label { font-size: 0.9rem; color: #666; font-weight: 500; }

        .btn-add-circle { width: 50px; height: 50px; border-radius: 15px; background: var(--primary-dark); color: var(--white); display: flex; align-items: center; justify-content: center; border: none; transition: 0.3s; }
        .btn-add-circle:hover { background: var(--primary); transform: rotate(90deg); }

        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh; background: var(--white); z-index: 2000; transition: var(--transition); padding: 25px; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 6px solid var(--primary-dark); }
        .cart-sidebar.active { right: 0; }

        .admin-panel { background: #fff; border: 2px solid var(--primary-dark); border-radius: var(--radius-lg); padding: 25px; margin: 30px 0; display: none; }
        .admin-panel.visible { display: block; }

        footer { padding: 40px 0; background: var(--slate-100); text-align: center; border-top: 1px solid var(--border); color: #666; font-size: 0.9rem; }
        .footer-brand { font-weight: 800; color: var(--primary-dark); }

        .wa-float { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; background: #25D366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; z-index: 900; box-shadow: 0 10px 30px rgba(37,211,102,0.4); text-decoration: none; }
        #notification { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(150px); background: var(--primary-dark); color: white; padding: 12px 35px; border-radius: 99px; z-index: 3000; transition: var(--transition); font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="#" class="logo-box">
                <img src="https://i.postimg.cc/zX76L7Zp/Whats-App-Image-2024-04-06-at-16-09-18.jpg" class="logo-img" alt="Logo">
                <div>
                    <b style="font-size: 1.3rem;">FRIGORÍFICO</b><br>
                    <span style="color: var(--primary); font-weight: 900; letter-spacing: 1px;">2 DE ABRIL</span>
                </div>
            </a>
            <button class="cat-btn" onclick="toggleCart()" style="background: var(--primary-dark); color: white; border: none; padding: 10px 20px;">
                <i class="fas fa-shopping-basket"></i> <span id="cart-count-head">0</span>
            </button>
        </div>
    </header>

    <main class="container">
        <section class="hero-banner">
            <img src="https://i.postimg.cc/zX76L7Zp/Whats-App-Image-2024-04-06-at-16-09-18.jpg" class="hero-logo" alt="Frigorífico 2 de Abril">
        </section>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="p-search" class="search-input" placeholder="¿Qué corte buscás hoy?" oninput="handleSearch()">
        </div>

        <div class="category-nav" id="cat-container"></div>
        
        <div class="bento-grid" id="prod-container">
             <p style="text-align:center; grid-column:1/-1; padding: 50px; color:#999;">Sincronizando con el frigorífico...</p>
        </div>

        <div style="text-align: center; margin: 40px 0;">
            <button class="cat-btn" onclick="checkAdmin()">Acceso Administración</button>
        </div>

        <section class="admin-panel" id="admin-panel">
            <h3>Panel de Control</h3>
            <div style="margin-top:15px;">
                <input type="text" id="sheet-url" class="search-input" style="padding:10px; border-radius:10px;" placeholder="URL de Google Sheets">
                <button class="cat-btn active" style="margin-top:10px; width:100%; background:var(--primary-dark);" onclick="syncExcel()">Actualizar Todo Ahora</button>
            </div>
        </section>
    </main>

    <!-- CARRITO -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-weight:800;">Tu Pedido</h2>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        <div id="cart-list" style="flex:1; overflow-y:auto;"></div>
        
        <div style="background:#f1f5f9; padding:20px; border-radius:20px; margin-bottom:15px;">
            <input type="text" id="cust-name" class="search-input" style="padding:12px; margin-bottom:15px;" placeholder="Tu Nombre y Apellido">
            <div style="display:flex; justify-content:space-between; font-weight:900; font-size:1.6rem; color:var(--primary-dark);">
                <span>Total</span><span id="total-price">$0</span>
            </div>
        </div>
        <button class="cat-btn active" style="width:100%; padding:20px; background:var(--primary-dark); font-size: 1.1rem;" onclick="sendWhatsApp()">ENVIAR PEDIDO POR WHATSAPP</button>
    </div>

    <div id="notification">¡Agregado!</div>
    <a href="https://wa.me/5491168705261" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <footer>
        <div class="container">
            <p>Hecho con <i class="fas fa-heart" style="color: #e74c3c;"></i> por <span class="footer-brand">Fontana Designs</span></p>
        </div>
    </footer>

    <script>
        const CONFIG = {
            // PEGA ACÁ TU URL DE GOOGLE SHEETS (IMPORTANTE: Debe terminar en output=csv)
            SHEET_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX_MteY9z1Of-MIimoruabnLSCY2p1mMDl0RvYeDWivYTfXljryTikNsCGM3yFdF-PcoWo2Zyb5EiS/pub?gid=0&single=true&output=csv",
            ADMIN_P: "2deabril"
        };

        let products = [], cart = [], currentCat = 'todos', searchQuery = "";

        window.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('sheet_frigo_v2') || CONFIG.SHEET_URL;
            document.getElementById('sheet-url').value = savedUrl;
            syncExcel(true);
        });

        async function syncExcel(silent = false) {
            const url = document.getElementById('sheet-url').value;
            try {
                const res = await fetch(url + "&cache=" + Date.now());
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(','));

                products = rows.slice(1).map(c => {
                    if (c.length < 5) return null;
                    return {
                        id: c[0].trim(),
                        nombre: c[1].trim(),
                        categoria: c[2].trim() || 'Otros',
                        precio: parseFloat(c[3]) || 0,
                        unidad: c[5] ? c[5].trim() : 'KG',
                        oferta: c[6] ? c[6].trim().toUpperCase() === 'S' : false,
                        foto: c[11] ? c[11].trim() : '' // Columna L
                    };
                }).filter(p => p !== null && p.id !== "");

                localStorage.setItem('sheet_frigo_v2', url);
                renderAll();
            } catch (e) { if(!silent) alert("Error: Asegurate que el Excel esté 'Publicado en la Web' como CSV"); }
        }

        function renderAll() { renderCats(); renderProds(); }

        function renderCats() {
            const container = document.getElementById('cat-container');
            const cats = ['todos', ...new Set(products.map(p => p.categoria.toLowerCase()))];
            container.innerHTML = cats.map(c => `
                <button class="cat-btn ${currentCat === c ? 'active' : ''}" onclick="filter('${c}')">${c.toUpperCase()}</button>
            `).join('');
        }

        function filter(c) { currentCat = c; renderAll(); }
        function handleSearch() { searchQuery = document.getElementById('p-search').value.toLowerCase(); renderProds(); }

        function renderProds() {
            const container = document.getElementById('prod-container');
            let filtered = products.filter(p => {
                const matchCat = currentCat === 'todos' || p.categoria.toLowerCase() === currentCat;
                const matchSearch = p.nombre.toLowerCase().includes(searchQuery);
                return matchCat && matchSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:50px;">No se encontraron productos.</p>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="addToCart('${p.id}')">
                    ${p.oferta ? `<div class="badge-offer">OFERTA</div>` : ''}
                    <div class="product-image-container">
                        ${p.foto ? `<img src="${p.foto}">` : `<i class="fas fa-meat fa-3x" style="color:#eee"></i>`}
                    </div>
                    <div style="flex:1">
                        <small style="color:var(--primary); font-weight:800; text-transform:uppercase;">${p.categoria}</small>
                        <h3 style="font-size:1.1rem; margin:5px 0; font-weight:700; color:var(--primary-dark);">${p.nombre}</h3>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                            <div class="current-price">$${p.precio.toLocaleString()}<span class="unit-label">/${p.unidad}</span></div>
                            <div class="btn-add-circle"><i class="fas fa-plus"></i></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty:1});
            updateCart();
            showNotif();
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map(item => {
                total += item.precio * item.qty;
                return `
                    <div style="display:flex; gap:12px; margin-bottom:15px; align-items:center; border-bottom:1px solid #eee; padding-bottom:12px;">
                        <div style="flex:1">
                            <b style="font-size:1rem; color:var(--primary-dark);">${item.nombre}</b><br>
                            <small style="font-weight:600;">$${item.precio.toLocaleString()} x ${item.qty} ${item.unidad}</small>
                        </div>
                        <button onclick="remove('${item.id}')" style="border:none; color:#ff4757; background:none; cursor:pointer; font-size:1.2rem;"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
            }).join('');
            document.getElementById('total-price').innerText = `$${total.toLocaleString()}`;
            document.getElementById('cart-count-head').innerText = cart.length;
        }

        function remove(id) { cart = cart.filter(i => i.id !== id); updateCart(); }

        function sendWhatsApp() {
            const name = document.getElementById('cust-name').value.trim();
            if(!name) return alert("Por favor, ingresá tu nombre para el pedido.");
            let msg = `*NUEVO PEDIDO - FRIGORÍFICO 2 DE ABRIL*%0A---------------------------%0ACliente: ${name}%0A%0A`;
            cart.forEach(i => msg += `• ${i.nombre} (x${i.qty} ${i.unit || 'KG'})%0A`);
            msg += `%0A*TOTAL: ${document.getElementById('total-price').innerText}*%0A---------------------------%0A_Enviado desde el catálogo web._`;
            window.open(`https://wa.me/5491168705261?text=${msg}`, '_blank');
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
        function showNotif() { const n = document.getElementById('notification'); n.style.transform="translateX(-50%) translateY(0)"; setTimeout(()=>n.style.transform="translateX(-50%) translateY(150px)", 2000); }
        function checkAdmin() { const p = prompt("Contraseña:"); if(p === CONFIG.ADMIN_P) document.getElementById('admin-panel').classList.toggle('visible'); }
    </script>
</body>
</html>
