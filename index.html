<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frigorífico 2 de Abril | Catálogo Oficial</title>
    
    <!-- SEO OPTIMIZADO -->
    <meta name="description" content="Catálogo mayorista y minorista de Frigorífico 2 de Abril. Carnes de primera calidad, cortes seleccionados y los mejores precios.">
    <meta name="author" content="Frigorífico 2 de Abril">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/zX76L7Zp/Whats-App-Image-2024-04-06-at-16-09-18.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00AEEF; /* Celeste Logo */
            --primary-dark: #003366; /* Azul Oscuro Logo */
            --primary-glow: rgba(0, 174, 239, 0.2);
            --dark: #1a1a1a; 
            --white: #ffffff;
            --slate-100: #f1f5f9;
            --border: #e2e8f0;
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--white); color: var(--dark); line-height: 1.6; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* HEADER PREMIUM */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary-dark);
            padding: 0.8rem 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 60px; width: auto; border-radius: 50%; border: 2px solid var(--primary); }
        .logo-text b { color: var(--primary-dark); font-size: 1.2rem; display: block; line-height: 1; }
        .logo-text span { color: var(--primary); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

        /* HERO BANNER */
        .hero-banner {
            margin: 20px 0;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #001a33 100%);
            border-radius: var(--radius-lg);
            height: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid var(--primary);
            color: white; text-align: center;
        }
        .hero-banner h2 { font-weight: 800; font-size: 2rem; letter-spacing: -1px; }
        .hero-banner p { color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; }

        /* BUSCADOR */
        .search-container { margin-bottom: 25px; position: relative; }
        .search-input { 
            width: 100%; padding: 18px 20px 18px 55px; border-radius: 15px; 
            border: 2px solid var(--border); background: var(--slate-100);
            font-size: 16px; outline: none; transition: var(--transition);
        }
        .search-input:focus { border-color: var(--primary); background: white; box-shadow: 0 10px 20px var(--primary-glow); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--primary-dark); font-size: 1.2rem; }

        /* CATEGORIAS */
        .category-nav { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cat-btn {
            padding: 12px 25px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--white); cursor: pointer; font-weight: 700; white-space: nowrap;
            transition: var(--transition); color: var(--primary-dark); font-size: 0.85rem;
        }
        .cat-btn.active { background: var(--primary-dark); color: var(--white); border-color: var(--primary-dark); }
        .cat-btn.offer-btn { background: #fee2e2; color: #ef4444; border-color: #fecaca; }
        .cat-btn.offer-btn.active { background: #ef4444; color: white; }

        /* GRID DE PRODUCTOS */
        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-bottom: 60px; 
        }
        .product-card { 
            background: var(--white); border-radius: var(--radius-lg); 
            border: 1px solid var(--border); padding: 20px; 
            transition: var(--transition); display: flex; flex-direction: column; 
            cursor: pointer; position: relative;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-color: var(--primary); }
        
        .badge-unit {
            position: absolute; top: 15px; right: 15px; background: var(--primary-dark); color: white;
            padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800;
        }

        .product-info h3 { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); margin: 10px 0; line-height: 1.3; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .current-price { font-size: 1.6rem; font-weight: 800; color: var(--dark); }
        .current-price span { font-size: 0.8rem; color: #666; font-weight: 400; }

        .btn-add { 
            background: var(--primary); color: white; border: none; 
            width: 45px; height: 45px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .btn-add:hover { background: var(--primary-dark); transform: rotate(90deg); }

        /* CARRITO SIDEBAR */
        .cart-sidebar { 
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; 
            height: 100vh; background: var(--white); z-index: 2000; 
            transition: 0.5s; padding: 30px; display: flex; flex-direction: column;
            box-shadow: -20px 0 40px rgba(0,0,0,0.2);
        }
        .cart-sidebar.active { right: 0; }

        /* FOOTER */
        footer { padding: 40px 0; background: var(--slate-100); text-align: center; border-top: 1px solid var(--border); }
        .heart { color: #e74c3c; }

        /* WHATSAPP FLOAT */
        .wa-float { 
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; 
            background: #25D366; color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; z-index: 900; box-shadow: 0 10px 30px rgba(37,211,102,0.4); 
        }

        #notification { 
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(150px); 
            background: var(--primary-dark); color: white; padding: 12px 30px; 
            border-radius: 50px; z-index: 3000; transition: 0.4s; 
        }
        
        @media (max-width: 480px) {
            .hero-banner h2 { font-size: 1.5rem; }
            .bento-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo-container">
                <img src="https://i.postimg.cc/zX76L7Zp/Whats-App-Image-2024-04-06-at-16-09-18.jpg" alt="Logo" class="logo-img">
                <div class="logo-text">
                    <b>FRIGORÍFICO 2 DE ABRIL</b>
                    <span>Calidad que se nota</span>
                </div>
            </div>
            <button class="btn-add" onclick="toggleCart()" style="background: var(--primary-dark); width: auto; padding: 0 15px; gap: 8px;">
                <i class="fas fa-shopping-basket"></i>
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main class="container">
        <section class="hero-banner">
            <p>Venta Directa</p>
            <h2>CORTES DE EXCELENCIA</h2>
            <div style="margin-top: 15px; font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px;">
                <i class="fas fa-truck"></i> Envíos a domicilio
            </div>
        </section>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search" class="search-input" placeholder="Buscar corte (ej: Asado, Cerdo, Cordero...)" oninput="renderProducts()">
        </div>

        <div class="category-nav" id="categories">
            <!-- Dinámico -->
        </div>

        <div class="bento-grid" id="products-grid">
            <!-- Dinámico -->
        </div>
    </main>

    <div class="cart-sidebar" id="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-weight: 800; color: var(--primary-dark);">Tu Pedido</h2>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        <div id="cart-items" style="flex:1; overflow-y:auto;"></div>
        <div style="padding-top:20px; border-top:2px solid var(--slate-100);">
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.5rem; margin-bottom:20px;">
                <span>Total:</span>
                <span id="cart-total">$0</span>
            </div>
            <button class="cat-btn active" style="width:100%; padding:20px; font-size:1.1rem;" onclick="checkout()">
                <i class="fab fa-whatsapp"></i> Enviar Pedido
            </button>
        </div>
    </div>

    <footer>
        <p>Hecho con <i class="fas fa-heart heart"></i> por <b>Fontana Designs</b></p>
    </footer>

    <a href="https://wa.me/5491168705261" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <div id="notification">¡Agregado al pedido!</div>

    <script>
        // CONFIGURACIÓN (REEMPLAZA ESTA URL POR LA DE TU EXCEL PUBLICADO)
        const EXCEL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX_MteY9z1Of-MIimoruabnLSCY2p1mMDl0RvYeDWivYTfXljryTikNsCGM3yFdF-PcoWo2Zyb5EiS/pub?gid=0&single=true&output=csv";

        let products = [];
        let cart = [];
        let currentCat = 'Todos';

        async function init() {
            try {
                const response = await fetch(EXCEL_URL + "&cache=" + Date.now());
                const data = await response.text();
                const rows = data.split('\n').slice(1);

                products = rows.map(row => {
                    const cols = row.split(',');
                    if(cols.length < 5) return null;
                    return {
                        id: cols[0].trim(),           // Código
                        nombre: cols[1].trim(),       // Descripción
                        rubro: cols[2].trim(),        // Rubro
                        precio: parseFloat(cols[3]),  // Precio Venta
                        unidad: cols[5].trim(),       // Unidad Venta (KG/UN)
                        oferta: cols[6].trim().toUpperCase() === 'S' // Oferta
                    };
                }).filter(p => p !== null);

                renderCategories();
                renderProducts();
            } catch (e) {
                console.error("Error cargando Excel", e);
            }
        }

        function renderCategories() {
            const rubros = ['Todos', ...new Set(products.map(p => p.rubro))];
            const container = document.getElementById('categories');
            container.innerHTML = rubros.map(r => `
                <button class="cat-btn ${currentCat === r ? 'active' : ''}" onclick="filter('${r}')">${r}</button>
            `).join('');
        }

        function filter(r) { currentCat = r; renderCategories(); renderProducts(); }

        function renderProducts() {
            const query = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('products-grid');
            
            const filtered = products.filter(p => {
                const matchCat = currentCat === 'Todos' || p.rubro === currentCat;
                const matchSearch = p.nombre.toLowerCase().includes(query);
                return matchCat && matchSearch;
            });

            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="addToCart('${p.id}')">
                    <span class="badge-unit">${p.unidad}</span>
                    <div class="product-info">
                        <small style="color:var(--primary); font-weight:700;">${p.rubro}</small>
                        <h3>${p.nombre}</h3>
                    </div>
                    <div class="price-row">
                        <div class="current-price">$${p.precio.toLocaleString()} <span>/ ${p.unidad}</span></div>
                        <button class="btn-add"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            updateUI();
            showNotify();
        }

        function updateUI() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.precio * item.qty;
                return `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #eee;">
                        <div>
                            <b style="font-size:0.9rem;">${item.nombre}</b><br>
                            <small>$${item.precio.toLocaleString()} x ${item.qty} ${item.unidad}</small>
                        </div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <button onclick="changeQty('${item.id}', -1)" style="border:none; background:#eee; width:25px; height:25px; border-radius:5px;">-</button>
                            <b>${item.qty}</b>
                            <button onclick="changeQty('${item.id}', 1)" style="border:none; background:#eee; width:25px; height:25px; border-radius:5px;">+</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('cart-count').innerText = cart.reduce((acc, i) => acc + i.qty, 0);
        }

        function changeQty(id, val) {
            const item = cart.find(i => i.id === id);
            item.qty += val;
            if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
            updateUI();
        }

        function checkout() {
            if(cart.length === 0) return;
            let msg = `*NUEVO PEDIDO - FRIGORÍFICO 2 DE ABRIL*%0A---------------------------%0A`;
            cart.forEach(i => {
                msg += `• ${i.nombre} | ${i.qty} ${i.unidad} x $${i.precio} = *$${(i.qty * i.precio).toLocaleString()}*%0A`;
            });
            msg += `---------------------------%0A*TOTAL: ${document.getElementById('cart-total').innerText}*%0A%0A_Por favor coordinar envío y pago._`;
            window.open(`https://wa.me/5491168705261?text=${msg}`, '_blank');
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
        function showNotify() { 
            const n = document.getElementById('notification');
            n.style.transform = "translateX(-50%) translateY(0)";
            setTimeout(() => n.style.transform = "translateX(-50%) translateY(150px)", 2000);
        }

        init();
    </script>
</body>
</html>
