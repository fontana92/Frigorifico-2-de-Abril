<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frigorífico 2 de Abril | Catálogo Online</title>
    
    <!-- SEO OPTIMIZADO -->
    <meta name="description" content="Catálogo oficial de Frigorífico 2 de Abril. Carnes de primera calidad, cortes seleccionados y los mejores precios del mercado. ✅ Envíos a domicilio">
    <meta name="author" content="Frigorífico 2 de Abril">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/zX76L7Zp/Whats-App-Image-2024-04-06-at-16-09-18.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #00AEEF; /* Celeste Malvinas */
            --primary-dark: #003366; /* Azul Marino */
            --primary-glow: rgba(0, 174, 239, 0.3);
            --dark: #0a0a0a; 
            --white: #ffffff;
            --slate-500: #64748b;
            --slate-100: #f1f5f9;
            --border: #e2e8f0;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--white); color: var(--dark); line-height: 1.6; overflow-x: hidden; width: 100%; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary-dark);
            padding: 0.7rem 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-img-header { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        .hero-banner {
            margin: 15px 0 30px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #001a33 100%);
            border-radius: var(--radius-lg);
            height: 250px;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid var(--primary);
        }
        .hero-content { text-align: center; color: white; z-index: 2; }
        .hero-logo { height: 100px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--primary-glow)); }

        .search-container { margin-bottom: 20px; position: relative; }
        .search-input { 
            width: 100%; padding: 15px 20px 15px 50px; border-radius: 99px; 
            border: 1px solid var(--border); background: var(--slate-100);
            font-size: 16px; outline: none; transition: var(--transition);
        }
        .search-input:focus { background: var(--white); border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--primary-dark); }

        .category-nav { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .cat-btn {
            padding: 10px 20px; border-radius: 99px; border: 1px solid var(--border);
            background: var(--white); cursor: pointer; font-weight: 600; white-space: nowrap;
            transition: var(--transition); color: var(--dark); font-size: 0.8rem;
        }
        .cat-btn.active { background: var(--primary-dark); color: var(--white); border-color: var(--primary-dark); }

        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .product-card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 15px; transition: var(--transition); display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .product-card:hover { transform: translateY(-8px); box-shadow: var(--shadow); border-color: var(--primary); }
        
        .badge-offer { position: absolute; top: 20px; left: 20px; background: #ff4757; color: white; padding: 4px 12px; border-radius: 99px; font-size: 0.7rem; font-weight: 800; z-index: 5; }

        .product-image-container { width: 100%; height: 180px; background: #f8fafc; border-radius: var(--radius-md); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image-container i { font-size: 3rem; color: #cbd5e1; }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .current-price { font-size: 1.6rem; font-weight: 800; color: var(--primary-dark); letter-spacing: -0.02em; }
        .unit-label { font-size: 0.85rem; color: var(--slate-500); font-weight: 500; }

        .btn-add-circle { width: 45px; height: 45px; border-radius: 50%; background: var(--primary-dark); color: var(--white); display: flex; align-items: center; justify-content: center; border: none; }

        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh; background: var(--white); z-index: 2000; transition: var(--transition); padding: 25px; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 5px solid var(--primary-dark); }
        .cart-sidebar.active { right: 0; }

        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display:none; align-items:center; justify-content:center; z-index: 2500; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--white); width: 100%; max-width: 900px; padding: 30px; border-radius: var(--radius-lg); position: relative; max-height: 90vh; overflow-y: auto; }

        .admin-panel { background: #fff; border: 2px solid var(--primary-dark); border-radius: var(--radius-lg); padding: 25px; margin: 30px 0; display: none; }
        .admin-panel.visible { display: block; }

        #notification { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(150px); background: var(--primary-dark); color: white; padding: 12px 30px; border-radius: 99px; z-index: 3000; transition: var(--transition); }
        .wa-float { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #25D366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; z-index: 900; box-shadow: 0 10px 30px rgba(37,211,102,0.4); text-decoration: none; }
        
        /* CHATBOT */
        .chatbot-toggle { position: fixed; bottom: 100px; right: 25px; width: 60px; height: 60px; background: var(--primary-dark); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; z-index: 900; box-shadow: 0 10px 30px var(--primary-glow); cursor: pointer; border: none; }
        .chatbot-container { position: fixed; bottom: 170px; right: 25px; width: 350px; height: 500px; background: white; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); z-index: 899; display: none; flex-direction: column; overflow: hidden; border: 3px solid var(--primary-dark); }
        .chatbot-container.active { display: flex; }
        .chatbot-header { background: var(--primary-dark); color: white; padding: 15px 20px; font-weight: 700; }
        
        footer { padding: 40px 0; background: var(--slate-100); text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="https://i.postimg.cc/zX76L7Zp/Whats-App-Image-2024-04-06-at-16-09-18.jpg" class="logo-img-header" alt="Logo">
                <div style="line-height: 1;">
                    <b style="color: var(--primary-dark); font-size: 1.2rem;">FRIGORÍFICO</b><br>
                    <span style="color: var(--primary); font-weight: 800; font-size: 0.9rem;">2 DE ABRIL</span>
                </div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="cat-btn" onclick="toggleCart()" style="background: var(--primary-dark); color: white; border: none; padding: 10px 18px;">
                    <i class="fas fa-shopping-basket"></i> <span id="header-cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero-banner">
            <div class="hero-content">
                <img src="https://i.postimg.cc/zX76L7Zp/Whats-App-Image-2024-04-06-at-16-09-18.jpg" class="hero-logo" alt="Frigorífico 2 de Abril">
                <h2>CALIDAD PREMIUM EN CARNES</h2>
                <p style="color: var(--primary); font-weight: 700; letter-spacing: 2px;">CORTES SELECCIONADOS DEL DÍA</p>
            </div>
        </section>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="product-search" class="search-input" placeholder="Buscar asado, vacío, cerdo, pollo..." oninput="handleSearch()">
        </div>

        <div class="category-nav" id="categories-container"></div>
        
        <div class="bento-grid" id="products-container">
             <p id="status-msg" style="text-align:center; grid-column: 1/-1; padding: 50px; color:#999;">Sincronizando precios y cortes...</p>
        </div>

        <div style="text-align: center; margin: 40px 0;">
            <button class="cat-btn" onclick="checkAdminAccess()">Acceso Administración</button>
        </div>

        <section class="admin-panel" id="admin-panel">
            <h3>Panel de Control del Frigorífico</h3>
            <div style="margin-top:15px;">
                <label style="font-size:0.8rem; font-weight:700;">URL del Excel de Productos:</label>
                <input type="text" id="excel-url" class="search-input" style="padding:10px; border-radius:10px;" placeholder="Pega la URL de Google Sheets">
                <button class="cat-btn active" style="margin-top:15px; width:100%; background: var(--primary-dark);" onclick="syncWithExcel()">Actualizar Stock Ahora</button>
            </div>
        </section>
    </main>

    <!-- CARRITO -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-weight: 800;">Tu Pedido</h2>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        <div id="cart-items" style="flex:1; overflow-y:auto;"></div>
        <div style="background: var(--slate-100); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <input type="text" id="customer-name" class="search-input" style="padding:12px; margin-bottom:10px;" placeholder="Tu Nombre">
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.4rem;">
                <span>Total</span><span id="cart-total">$0</span>
            </div>
        </div>
        <button class="cat-btn active" style="width:100%; padding:18px; background: var(--primary-dark);" onclick="checkoutViaWhatsApp()">Enviar Pedido al Frigorífico</button>
    </div>

    <!-- MODAL DETALLE -->
    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <span onclick="closeModal('detail-modal')" style="position:absolute; top:15px; right:20px; font-size:2rem; cursor:pointer;">&times;</span>
            <div id="detail-content"></div>
        </div>
    </div>

    <!-- CHATBOT -->
    <button class="chatbot-toggle" onclick="toggleChatbot()"><i class="fas fa-headset"></i></button>
    <div class="chatbot-container" id="chatbot-container">
        <div class="chatbot-header">Asistente Frigorífico</div>
        <div id="chatbot-messages" style="flex:1; padding:20px; overflow-y:auto; font-size:0.9rem;"></div>
        <div style="padding:10px; border-top:1px solid var(--border); display:flex; gap:10px;">
            <input type="text" id="chatbot-input" style="flex:1; border:1px solid var(--border); padding:10px; border-radius:10px;" placeholder="Tengo una consulta...">
            <button onclick="sendChatbotMessage()" style="background:var(--primary-dark); color:white; border:none; padding:10px; border-radius:10px;">></button>
        </div>
    </div>

    <div id="notification">¡Añadido!</div>
    <a href="https://wa.me/5491168705261" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <footer>
        <div class="container">
            <p>© 2026 <b>Frigorífico 2 de Abril</b>. Hecho con ❤️ por <b>Fontana Designs</b></p>
        </div>
    </footer>

    <script>
        const CONFIG = {
            ADMIN: { user: "admin", pass: "2deabril" },
            KEY: "frigo_2deabril_v1",
            MASTER_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX_MteY9z1Of-MIimoruabnLSCY2p1mMDl0RvYeDWivYTfXljryTikNsCGM3yFdF-PcoWo2Zyb5EiS/pub?gid=0&single=true&output=csv"
        };

        let products = [], cart = [], currentCategory = 'todos', searchQuery = "";

        // Sincronización con el Excel que me pasaste
        async function syncWithExcel(silent = false) {
            const urlInput = document.getElementById('excel-url').value || CONFIG.MASTER_URL;
            try {
                const response = await fetch(urlInput + "&cache=" + Date.now());
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => row.split(','));

                products = rows.slice(1).map(cols => {
                    if (cols.length < 4) return null;
                    return {
                        clave: cols[0].trim(),
                        nombre: cols[1].trim(),
                        categoria: cols[2].trim() || 'Otros',
                        precio: parseFloat(cols[3]) || 0,
                        unidad: cols[5] ? cols[5].trim() : 'KG',
                        oferta: cols[6] ? cols[6].trim().toUpperCase() === 'S' : false,
                        foto: cols[11] ? cols[11].trim() : '' // Ajustado a la col 11 según el código anterior
                    };
                }).filter(p => p !== null && p.clave !== "");

                localStorage.setItem(CONFIG.KEY, JSON.stringify(products));
                localStorage.setItem('sheet_url_frigo', urlInput);
                renderAll();
            } catch (e) {
                if(!silent) alert("Error al sincronizar. Asegúrate de que el Excel esté publicado como CSV.");
            }
        }

        function renderProducts() {
            const container = document.getElementById('products-container');
            let filtered = products.filter(p => {
                const matchCat = currentCategory === 'todos' || p.categoria.toLowerCase() === currentCategory;
                const matchSearch = p.nombre.toLowerCase().includes(searchQuery);
                return matchCat && matchSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:50px;">No se encontraron productos.</p>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="addToCart('${p.clave}')">
                    ${p.oferta ? `<div class="badge-offer">OFERTA</div>` : ''}
                    <div class="product-image-container">
                        ${p.foto ? `<img src="${p.foto}">` : `<i class="fas fa-drumstick-bite"></i>`}
                    </div>
                    <div style="flex:1">
                        <p style="font-size:0.7rem; color:var(--primary); font-weight:700; text-transform:uppercase;">${p.categoria}</p>
                        <h3 style="font-size:1rem; margin:5px 0 10px 0; font-weight:700;">${p.nombre}</h3>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="current-price">$${p.precio.toLocaleString()}<span class="unit-label">/${p.unidad}</span></div>
                            <div class="btn-add-circle"><i class="fas fa-plus"></i></div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // --- FUNCIONALIDADES COPIADAS DEL CATALOGO ANTERIOR ---
        function renderCategories() {
            const container = document.getElementById('categories-container');
            const cats = ['todos', ...new Set(products.map(p => p.categoria.toLowerCase()))];
            container.innerHTML = cats.map(c => `
                <button class="cat-btn ${currentCategory === c ? 'active' : ''}" onclick="filterCat('${c}')">
                    ${c.toUpperCase()}
                </button>
            `).join('');
        }

        function filterCat(c) { currentCategory = c; renderAll(); }
        function handleSearch() { searchQuery = document.getElementById('product-search').value.toLowerCase(); renderProducts(); }
        function renderAll() { renderCategories(); renderProducts(); }

        function addToCart(clave) {
            const p = products.find(i => i.clave === clave);
            const exist = cart.find(i => i.clave === clave);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            updateCartUI();
            showNotify();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.precio * item.qty;
                return `<div style="display:flex; gap:15px; margin-bottom:15px; align-items:center; background:var(--slate-100); padding:10px; border-radius:12px;">
                    <div style="flex:1"><b>${item.nombre}</b><br><small>$${item.precio.toLocaleString()} x ${item.qty} ${item.unidad}</small></div>
                    <button onclick="removeFromCart('${item.clave}')" style="border:none; color:red; background:none; cursor:pointer;"><i class="fas fa-trash"></i></button></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('header-cart-count').innerText = cart.length;
        }

        function removeFromCart(clave) { cart = cart.filter(i => i.clave !== clave); updateCartUI(); }

        function checkoutViaWhatsApp() {
            const name = document.getElementById('customer-name').value;
            if(!name) return alert("Por favor ingresa tu nombre.");
            let msg = `*PEDIDO FRIGORÍFICO 2 DE ABRIL*%0ACliente: ${name}%0A%0A`;
            cart.forEach(i => msg += `• ${i.nombre} (x${i.qty} ${i.unidad})%0A`);
            msg += `%0ATOTAL: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/5491168705261?text=${msg}`, '_blank');
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
        function showNotify() { const n = document.getElementById('notification'); n.style.transform = "translateX(-50%) translateY(0)"; setTimeout(() => n.style.transform = "translateX(-50%) translateY(150px)", 2000); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function checkAdminAccess() { 
            const p = prompt("Contraseña Admin:"); 
            if(p === CONFIG.ADMIN.pass) document.getElementById('admin-panel').classList.toggle('visible'); 
        }

        // Chatbot adaptado
        function toggleChatbot() { document.getElementById('chatbot-container').classList.toggle('active'); }
        function sendChatbotMessage() {
            const input = document.getElementById('chatbot-input');
            const msg = input.value.toLowerCase();
            const box = document.getElementById('chatbot-messages');
            box.innerHTML += `<div><b>Vos:</b> ${input.value}</div>`;
            let resp = "Soy el asistente de Frigorífico 2 de Abril. ¿Puedo ayudarte con los precios de hoy o las zonas de envío?";
            if(msg.includes("oferta")) resp = "Revisá los productos con la etiqueta roja 'OFERTA'. ¡Los mejores precios de la zona!";
            if(msg.includes("envio")) resp = "Hacemos envíos a Pilar y alrededores. Al finalizar tu pedido por WhatsApp coordinamos la entrega.";
            box.innerHTML += `<div style="color:var(--primary-dark)"><b>Bot:</b> ${resp}</div><br>`;
            input.value = "";
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('sheet_url_frigo') || CONFIG.MASTER_URL;
            document.getElementById('excel-url').value = savedUrl;
            syncWithExcel(true);
        });
    </script>
</body>
</html>
